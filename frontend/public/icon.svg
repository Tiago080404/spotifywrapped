<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1db954"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1db954"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1db954;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1db954;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#1db954" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Outer wrapped ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring1)" stroke-width="8" stroke-dasharray="220 100 80 60" stroke-linecap="round" opacity="0.6"/>

  <!-- Inner wrapped ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ring2)" stroke-width="6" stroke-dasharray="140 80 60 40" stroke-linecap="round" opacity="0.4"/>

  <!-- Sound wave bars -->
  <g filter="url(#shadow)" opacity="0.9">
    <!-- Left bars -->
    <rect x="148" y="220" width="16" height="72" rx="8" fill="url(#ring1)" opacity="0.5"/>
    <rect x="176" y="190" width="16" height="132" rx="8" fill="url(#ring1)" opacity="0.65"/>
    <rect x="204" y="210" width="16" height="92" rx="8" fill="url(#ring1)" opacity="0.8"/>

    <!-- Center bars (tallest) -->
    <rect x="232" y="160" width="20" height="192" rx="10" fill="url(#note)"/>
    <rect x="260" y="140" width="20" height="232" rx="10" fill="url(#note)"/>

    <!-- Right bars -->
    <rect x="292" y="200" width="16" height="112" rx="8" fill="url(#ring2)" opacity="0.8"/>
    <rect x="320" y="180" width="16" height="152" rx="8" fill="url(#ring2)" opacity="0.65"/>
    <rect x="348" y="228" width="16" height="56" rx="8" fill="url(#ring2)" opacity="0.5"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="130" cy="130" r="6" fill="#1db954" opacity="0.7"/>
  <circle cx="390" cy="150" r="4" fill="#06b6d4" opacity="0.6"/>
  <circle cx="370" cy="380" r="5" fill="#a855f7" opacity="0.5"/>
  <circle cx="140" cy="360" r="4" fill="#f43f5e" opacity="0.6"/>
</svg>
