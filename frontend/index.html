<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spotify Wrapped</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="background-color" content="#050505">

    <!-- iOS Webapp -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wrapped">

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no">

    <!-- Description -->
    <meta name="description" content="Deine persoenliche Spotify Music Story — Top Artists, Tracks, Genres & mehr">
  </head>
  <body>
    <div id="app"></div>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
