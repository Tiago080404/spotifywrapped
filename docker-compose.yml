services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend/my-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/my-app/.env
    restart: unless-stopped
